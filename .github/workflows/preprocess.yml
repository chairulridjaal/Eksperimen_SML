name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'titanic_raw/**'
      - 'preprocessing/automate_MochamadChairulridjalNurvikri.py'
  workflow_dispatch:

jobs:
  preprocess-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'
        cache: 'pip' # Mengaktifkan caching untuk pip (Advanced criteria)

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run preprocessing script
      run: |
        cd preprocessing
        python automate_MochamadChairulridjalNurvikri.py
        
    - name: Commit and push processed data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add preprocessing/titanic_preprocessing/titanic_preprocessed.csv
        git add preprocessing/titanic_preprocessing/preprocessor.pkl
        # Commit hanya jika ada perubahan
        git commit -m "Auto-update preprocessed data and pipeline artifacts [skip ci]" || echo "No changes to commit"
        git push
